<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        body {
            background: linear-gradient(to right, #8bb9fe, dodgerblue);
            font-family: Arial;
            padding: 15%;
            margin: 0;
        }

        .Tabla {
            background: linear-gradient(to right, purple, indigo, darkmagenta);
            padding: 15px 10px 15px 10px;
            display: flex;
            flex-direction: column;
            color: white;
            font-weight: bold;
            border: darkblue solid 3px;
            border-radius: 10px;
            margin: 10px 100px 20px 100px;
        }

        .Formulario {
            background: linear-gradient(to right, orange, orangered, darkorange);
            padding: 15px 10px 15px 10px;
            display: flex;
            flex-direction: column;
            color: white;
            font-weight: bold;
            border: darkblue solid 3px;
            border-radius: 10px;
            margin: 10px 100px 100px 100px;
        }
    </style>
</head>
<body>
    <div class="Tabla">
    <table id="tabla">
        <tr>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Correo</th>
        </tr>
        <tr>
            <td>Derick</td>
            <td>30</td>
            <td>dericklagunes@utez.edu.mx</td>
        </tr>
    </table>
    <button type="button" id="add">Agregar elemento</button>
    </div>

    <div class="Formulario">
        <form action="#" method="post" id="formulario">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <br>
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad">
            <br>
            <label for="correo">Correo:</label>
            <input type="text" id="correo" name="correo">
            <br>
            <button id="agregar_persona" type="button">Agregar nueva persona</button>
            <br>
            <p id="mensaje"></p>
        </form>
    </div>

<script src="js/Tabla.js"></script>
</body>
</html>
