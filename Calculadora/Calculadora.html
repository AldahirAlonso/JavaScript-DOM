<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Calculadora</title>
    <style>
        body {
            background: #6edff6;
            margin: 150px 200px;
            padding: 150px;
            border: 5px solid blue;
            box-shadow: 20px 20px 1px dodgerblue;
        }

        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: arial, sans-serif;
            font-weight: bold;
            font-size: x-large;
        }

        .resultado {
            color: red;
        }

    </style>
</head>
<body>
    <main>
        <form action="#" method="post">

        <label>Ingrese un numero 1</label>
        <input type="text" required name="numero1" id="numero1">

        <br>

        <label>Ingrese un numero 2</label>
        <input type="text" required name="numero2" id="numero2">

        <br> <br>

        <button type="button" id="sumar"> + </button>
        <button type="button" id="restar"> - </button>
        <button type="button" id="multiplicar"> * </button>
        <button type="button" id="dividir"> / </button>

        </form>

        <p>El resultado es: <b class="resultado" id="resultado"></b> </p>
    </main>

<script src="js/Calculadora.js"></script>
</body>
</html>
